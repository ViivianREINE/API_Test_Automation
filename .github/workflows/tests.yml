name: Run API Tests

on: 
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  BASE_URL: https://jsonplaceholder.typicode.com
  ENV: dev

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create reports directory
      run: mkdir -p reports/allure

    - name: Run tests with reports (Sequential)
      run: |
        pytest -v --tb=short --html=reports/report.html --self-contained-html --alluredir=reports/allure

    - name: Run tests in parallel
      if: always()
      run: |
        pytest -n auto -v --tb=short

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: html-report-python${{ matrix.python-version }}
        path: reports/report.html

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: allure-results-python${{ matrix.python-version }}
        path: reports/allure

    - name: Test Summary
      if: always()
      run: |
        echo "✅ Test execution completed for Python ${{ matrix.python-version }}!"
        echo "📊 Reports generated and uploaded as artifacts"
